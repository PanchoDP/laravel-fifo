name: Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: [8.4, 8.5]
        laravel-version: [11, 12, 13]
        include:
          - laravel-version: 11
            testbench: ^9.0
          - laravel-version: 12
            testbench: ^10.0
          - laravel-version: 13
            testbench: ^11.0

    name: PHP ${{ matrix.php-version }} / Laravel ${{ matrix.laravel-version }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
        coverage: none

    - name: Require specific testbench version
      run: composer require "orchestra/testbench:${{ matrix.testbench }}" --no-update --dev

    - name: Install dependencies
      run: composer update --prefer-dist --no-progress

    - name: Run tests
      run: composer test

    - name: Run code formatting check
      run: composer pint

    - name: Run static analysis
      run: composer analyse